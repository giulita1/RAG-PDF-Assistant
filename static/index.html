<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Document Assistant</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
    <div class="chat-card">
   <h1>Chateá acerca de tu PDF</h1>
   <div class="mensajes" id="mensajes"></div>
   <div class="container_enviar">
    <label for="pdf_input" class="pdf_input"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.75" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-icon lucide-file"><path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/><path d="M14 2v5a1 1 0 0 0 1 1h5"/></svg></label>
    <input type="file" id="pdf_input" accept="application/pdf" hidden>
    <input type="text" id="input_chatear" placeholder="Escribí tu pregunta...">
    <button type="button" class="btn_enviar" id="btn_enviar"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.75" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-arrow-up-icon lucide-arrow-up"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
    </button>
   </div>
   <button type="button" class="btn_reset" id="btn_reset">RESET</button>
   </div>
   </div>
   <script defer src="/static/script.js"></script>
</body>
</html>
